<!DOCTYPE html>
<html>
<head>
  <title>Crown Costumes</title>
  <link href="estilos.css" rel="stylesheet">
</head>

<body>

<header>
  <h1>Crown Costume</h1>
</header>

<section>
  <h2 style="text-align:center;">Seu Carrinho</h2>

  <table class="carrinho">
    <tr>
      <th>Produto</th>
      <th>Nome</th>
      <th>Qtd</th>
      <th>Preço</th>
      <th>Total</th>
    </tr>

    <tr>
      <td><img src="img/rainha.jpg" width="60"></td>
      <td>Rainha Sombria</td>
      <td>1</td>
      <td>R$ 299,90</td>
      <td>R$ 299,90</td>
    </tr>

    <tr>
      <td><img src="img/rei.jpg" width="60"></td>
      <td>Rei Medieval</td>
      <td>1</td>
      <td>R$ 279,90</td>
      <td>R$ 279,90</td>
    </tr>

    <tr>
      <td><img src="img/vampira.jpg" width="60"></td>
      <td>Vampira Luxo</td>
      <td>1</td>
      <td>R$ 199,90</td>
      <td>R$ 199,90</td>
    </tr>
  </table>

  <div class="resumo">
    <h3>Resumo do pedido</h3>

    <label>CEP:</label>
    <input type="text" placeholder="Digite seu CEP">

    <p>Frete: R$ 30,00</p>
    <h2>Total: R$ 809,70</h2>

    <button class="btn">Finalizar Compra</button>
  </div>
</section>

<footer>
  <p>© 2026 Crown Costume</p>
</footer>

</body>
</html>
